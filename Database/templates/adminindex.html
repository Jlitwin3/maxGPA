<!DOCTYPE html>
<!--
  ============================================================
  FILE:    adminindex.html
Admin panel for uploading backend data into MaxGPA.
    Provides two workflows:
    1. Upload a grade distribution CSV file, which is
        parsed server-side and inserted into the database.
    2. Upload degree plan CSV files (up to three total),
        which define the course requirements for each supported major.
    Both workflows include a preview-before-commit step
        so the admin can verify data before it is written
        to the database (irreversible action).
  AUTHOR: Dennis Hulett, last updated May 4 2026
  ============================================================
-->
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <title>MaxGPA — Upload</title>
  <style>
    /* Hide all tab panels by default; only the panel with the
       'active' class will be shown at any given time. */
    .panel { display: none; }
    .panel.active { display: block; }
  </style>
</head>
<body>
  <header>
    <h1>MaxGPA Admin Panel</h1>
  </header>
  <!-- --------------------------------------------------------
       TAB NAVIGATION
       Two top-level tabs let the admin switch between the two
       data-upload workflows without navigating to a new page,
       as well as a button to return to the student view.
  --------------------------------------------------------- -->
  <nav class="tabs">
  <button class="tab-btn active" onclick="switchTab(this,'grade')">Submit Grade Info</button>
  <button class="tab-btn"        onclick="switchTab(this,'plans')">Submit Degree Plans</button>
  <button type="button" onclick="window.location.href='/'">Student View</button>
  </nav>
  <br><br>

  <!-- --------------------------------------------------------
       SECTION 1 — GRADE DISTRIBUTION UPLOAD
       Lets the admin choose a CSV file containing grade
       distribution data, preview its parsed contents returned
       by the server, then confirm or cancel the final write
       to the database.
  --------------------------------------------------------- -->
  <section class="panel active" id="tab-grade">
    <label for="file-upload">Upload grade distribution csv file:</label>
    <input type="file" id="file-upload" name="file-upload" accept=".csv">
    <br><br>
    <!-- "Submit" triggers a preview fetch; the confirm/cancel
         buttons below are hidden until the preview returns.   -->
    <button id="submit-prev">Submit</button>
    <p id="status"></p> <!-- live status / progress messages -->

    <pre id="preview"></pre> <!-- JSON preview of parsed CSV rows -->
    <!-- Confirm / cancel controls; hidden until preview is ready -->
    <label for="submit-btn" id="label" style="display:none">Does this preview look ok? Your action cannot be undone.</label>
    <button id="submit-btn" style="display:none">Yes</button>
    <button id="cancel" style="display:none">No</button>
  </section>

  <!-- --------------------------------------------------------
       SECTION 2 — DEGREE PLAN UPLOAD
       Lets the admin upload up to three degree-plan CSV files,
       one at a time. Like Section 1 it uses a preview-then-
       confirm workflow. A running list of uploaded plan names
       is displayed at the bottom so the admin knows which
       plans are already loaded.
  --------------------------------------------------------- -->
  <section class="panel" id="tab-plans">
    <label for="degree-upload">Upload degree plan csv file:</label>
    <input type="file" id="degree-upload" name="degree-upload" accept=".csv">
    <br><br>
    <!-- "Submit" triggers a preview fetch for the degree plan  -->
    <button id="degree-prev">Submit</button>
    <p id="dgstatus"></p>  <!-- live status messages for this tab -->
    <pre id="dgpreview"></pre> <!-- JSON preview of the parsed degree plan -->
    <!-- Confirm / cancel controls; hidden until preview is ready -->
    <label for="dgsubmit-btn" id="dglabel" style="display:none">Does this preview look ok? Your action cannot be undone.</label>
    <button id="dgsubmit-btn" style="display:none">Yes</button>
    <button id="dgcancel" style="display:none">No</button>
    <br><br>
    <!-- Running display of degree plan file names that have
         already been successfully uploaded this session.  -->
    <div class="card">
      <div class="card-title">Currently Loaded Degree Plans (Please upload only three, one at a time):</div>
      <p id="gradeprev"></p>  <!-- file names appended here after each upload -->
    </div>
  </section>

  <!-- ==========================================================
       JAVASCRIPT — ADMIN PANEL LOGIC
       Handles tab switching, file previews, streaming upload
       progress, and confirmation / cancellation for both the
       grade-distribution and degree-plan upload workflows.
  =========================================================== -->
  <script>
    /* sanity-check log to confirm the script has loaded. */
    console.log("Hi I'm Working");

    /* ==========================================================
       TAB SWITCHING
    ========================================================== */

    /* switchTab — shows the panel that matches `name` and marks
       the clicked button as active, hiding all other panels and
       deactivating all other tab buttons.
       @param {HTMLElement} btn  — the tab button that was clicked
       @param {string}      name — the panel id suffix ('grade'
                                   or 'plans')                   */
    function switchTab(btn, name) {
      /* Remove 'active' from every panel and every tab button,
         then re-apply it only to the selected panel and button. */
    document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    document.getElementById('tab-' + name).classList.add('active');
    btn.classList.add('active');
        }

    /* ==========================================================
       SECTION 1 — GRADE DISTRIBUTION: PREVIEW STEP
       When the admin clicks "Submit", POST the chosen CSV to
       /upload-prev and display the server's parsed JSON so the
       admin can verify the data before committing.
    ========================================================== */
    document.getElementById('submit-prev').addEventListener('click', () => {
        
      /* Grab DOM references needed throughout this handler. */
        const fileInput = document.getElementById('file-upload');
        const statusEl  = document.getElementById('status');
        const preview = document.getElementById('preview');

      /* require a file to be selected before proceeding. */
        if (!fileInput.files || fileInput.files.length === 0) {
        statusEl.textContent = 'Please select a CSV file first.';
        return;
        }
      /* Package the selected file into formdata. */
        const formData = new FormData();
        formData.append('file', fileInput.files[0]);

      /* show a working indicator so the admin knows the request is in. */
        statusEl.textContent = 'Checking…';
    
      /* POST to the preview endpoint; on success, render the
         returned JSON into the <pre> element for inspection.   */
        fetch('/upload-prev', { method: 'POST', body: formData })
        .then(response => response.json())
        .then(data => {
            preview.textContent = JSON.stringify(data, null, 2);
        })
        .catch(err => {
          /* On network or server error, surface the failure and
             re-enable the button so the admin can try again.   */
            console.error(err);
            statusEl.textContent = 'Error submitting file.';
            document.getElementById('submit-prev').disabled = false;
        });
      /* Reveal the confirm / cancel controls now that a preview
         request is underway (they render once data arrives).   */
        document.getElementById('submit-btn').style.display = 'inline-block';
        document.getElementById('label').style.display = 'inline-block';
        document.getElementById('cancel').style.display = 'inline-block';
    });

    /* ==========================================================
       SECTION 1 — GRADE DISTRIBUTION: CONFIRM (COMMIT) STEP
       Admin clicked "Yes" after reviewing the preview. POST the
       file to /upload-endpoint and stream progress updates until
       the server signals it is done.
    ========================================================== */
    document.getElementById('submit-btn').addEventListener('click', function (e) {
        e.preventDefault();

      /* Grab DOM references needed throughout this handler. */
        const fileInput = document.getElementById('file-upload');
        const statusEl  = document.getElementById('status');

      /* Package the selected file into formdata. */
        const formData = new FormData();
        formData.append('file', fileInput.files[0]);

        /* show a working indicator so the admin knows the request is in. */g
        statusEl.textContent = 'Uploading…';

      /* POST to the upload endpoint. The server responds with a
         text/event-stream so the admin sees live progress while
         the file is being parsed and written to the database.  */
        fetch('/upload-endpoint', { method: 'POST', body: formData })
        .then(response => {
          /* Set up a streaming reader and UTF-8 decoder to
             incrementally consume the server-sent event stream. */
            const reader = response.body.getReader();
            const decoder = new TextDecoder();
            let buffer = ''; /* incomplete line carry-over buffer */

          /* read — recursive function that pulls chunks from the
             stream one at a time until the stream is exhausted. */
            function read() {
            reader.read().then(({ done, value }) => {
              /* Stop processing when the stream closes. */
                if (done) return;

              /* Append the new chunk to the carry-over buffer,
                 then split on newlines to isolate complete lines. */
                buffer += decoder.decode(value, { stream: true });
                const lines = buffer.split('\n');
                buffer = lines.pop(); // keep incomplete last line

              /* Process each complete SSE line. */
                for (const line of lines) {
                /* SSE data lines always begin with "data: "; skip
                   comment lines, blank lines, and event markers. */
                if (!line.startsWith('data: ')) continue;
                try {
                /* Parse the JSON payload and update the status
                   message with the latest row / insert counts.  */
                    const msg = JSON.parse(line.slice(6));
                    statusEl.textContent =
                    `Processed ${msg.rows.toLocaleString()} rows, inserted ${msg.inserted.toLocaleString()} documents…`;
                
                  /* When the server signals completion, display a
                     final summary and stop reading the stream.   */
                    if (msg.done) {
                    statusEl.textContent =
                        `Done! Inserted ${msg.inserted.toLocaleString()} documents from ${msg.rows.toLocaleString()} rows.`;
                    return;
                    }
                } catch (_) {} /* Silently skip malformed SSE lines. */
                }
                read(); /* Request the next chunk from the stream. */
            });
            }
            read(); /* Kick off the streaming read loop. */

          /* Clear the preview area and hide confirm / cancel
             controls now that the commit is underway.*/
            document.getElementById('preview').textContent = '';
            document.getElementById('submit-btn').style.display = 'none';
            document.getElementById('label').style.display = 'none';
            document.getElementById('cancel').style.display = 'none';
        })
        .catch(err => {
          /* On error, surface the failure and re-enable the
             confirm button so the admin can retry.*/
            console.error(err);
            statusEl.textContent = 'Error submitting file.';
            document.getElementById('submit-btn').disabled = false;
        });
    });

    /* ==========================================================
       SECTION 1 — GRADE DISTRIBUTION: CANCEL STEP
       Admin clicked "No" after reviewing the preview. Clear the
       preview area and hide confirm / cancel controls without
       sending any data to the server.
    ========================================================== */
    document.getElementById('cancel').addEventListener('click', () => {
        const preview = document.getElementById('preview');
        const statusEl  = document.getElementById('status');
      /* Wipe the preview display and inform the admin that the
         import was abandoned. */
        preview.textContent = '';
        statusEl.textContent = "Import canceled.";
      /* Hide confirm / cancel controls, returning the UI to its
         initial state so the admin can start over if needed.   */
        document.getElementById('submit-btn').style.display = 'none';
        document.getElementById('label').style.display = 'none';
        document.getElementById('cancel').style.display = 'none';
    });


    /* ==========================================================
       SECTION 2 — DEGREE PLANS: CANCEL STEP
       Admin clicked "No" after reviewing the degree plan preview.
       Mirrors the Section 1 cancel handler for the degree-plan
       workflow.
    ========================================================== */
    document.getElementById('dgcancel').addEventListener('click', () => {
        const preview = document.getElementById('dgpreview');
        const statusEl  = document.getElementById('dgstatus');
      /* Wipe the preview display and inform the admin that the
         import was abandoned. */
        preview.textContent = '';
        statusEl.textContent = "Import canceled.";
      /* Hide confirm / cancel controls, returning the UI to its
         initial state so the admin can start over if needed.   */
        document.getElementById('dgsubmit-btn').style.display = 'none';
        document.getElementById('dglabel').style.display = 'none';
        document.getElementById('dgcancel').style.display = 'none';
    });

    /* ==========================================================
       SECTION 2 — DEGREE PLANS: PREVIEW STEP
       When the admin clicks "Submit" in the degree-plans tab,
       enforce the three-plan limit, then POST the chosen CSV to
       /degree-prev and display parsed JSON for review.
    ========================================================== */
    document.getElementById('degree-prev').addEventListener('click', () => {
        
      /* Grab DOM references needed throughout this handler. */
        const fileInput = document.getElementById('degree-upload');
        const statusEl  = document.getElementById('dgstatus');
        const preview = document.getElementById('dgpreview');

      /* require a file to be selected before proceeding. */
        if (!fileInput.files || fileInput.files.length === 0) {
        statusEl.textContent = 'Please select a CSV file first.';
        return;
        }
      /* Package the selected file into a multipart form payload. */
        const formData = new FormData();
        formData.append('file', fileInput.files[0]);

      /* Disable the preview button while the request is in flight
         so the admin cannot trigger duplicate submissions.      */
        this.disabled = true;

      /* POST to the degree-plan preview endpoint; on success,
         render the returned JSON for the admin to inspect.     */
        fetch('/degree-prev', { method: 'POST', body: formData })
        .then(response => response.json())
        .then(data => {
            preview.textContent = JSON.stringify(data, null, 2);
        })
        .catch(err => {
          /* On error, surface the failure message.*/
            console.error(err);
            statusEl.textContent = 'Error submitting file.';
        });
      /* Reveal the confirm / cancel controls so the admin can
         approve or reject the previewed data. */
        document.getElementById('dgsubmit-btn').style.display = 'inline-block';
        document.getElementById('dglabel').style.display = 'inline-block';
        document.getElementById('dgcancel').style.display = 'inline-block';
    });

    /* ==========================================================
       SECTION 2 — DEGREE PLANS: CONFIRM (COMMIT) STEP
       Admin clicked "Yes" after reviewing the degree plan
       preview. POST the file to /upload-dg-endpoint, then update
       the "currently loaded" list with the uploaded file name.
    ========================================================== */
    document.getElementById('dgsubmit-btn').addEventListener('click', function (e) {
        e.preventDefault();

      /* Grab DOM references needed throughout this handler. */
        const fileInput = document.getElementById('degree-upload');
        const statusEl  = document.getElementById('dgstatus');
        const degreePrev  = document.getElementById('gradeprev'); /* loaded-plans display */

      /* Package the selected file into a multipart form payload. */
        const formData = new FormData();
        formData.append('file', fileInput.files[0]);

      /* Inform the admin that the upload is in progress. */
        statusEl.textContent = 'Uploading…';

      /* POST to the degree-plan upload endpoint. Unlike the
         grade-distribution upload, this does not use streaming;
         a simple success response is sufficient. */
        fetch('/upload-dg-endpoint', { method: 'POST', body: formData })
        .then(response => {
          /* On success, confirm completion and append the file
             name to the running list of loaded degree plans.   */
            statusEl.textContent = 'Done!';
            degreePrev.textContent += `${fileInput.files[0].name} `;

          /* Clear the preview area and hide the confirm / cancel
             controls to return the UI to its initial state.    */
            document.getElementById('dgpreview').textContent = '';
            document.getElementById('dgsubmit-btn').style.display = 'none';
            document.getElementById('dglabel').style.display = 'none';
            document.getElementById('dgcancel').style.display = 'none';
        })
        .catch(err => {
            /* On error, surface the failure so the admin can retry. */
            console.error(err);
            statusEl.textContent = 'Error submitting file.';
        });
    });
  </script>
</body>
</html>
